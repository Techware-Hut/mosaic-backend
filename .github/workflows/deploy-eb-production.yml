name: Deploy to Elastic Beanstalk

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  EB_APPLICATION_NAME: ${{ vars.EB_APPLICATION_NAME || 'mosaic-biz-hub-backend' }}
  EB_ENVIRONMENT_NAME: ${{ vars.EB_ENVIRONMENT_NAME || 'mosaic-backend-env' }}
  PRODUCTION_API_URL: https://api.mosaicbizhub.com

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 45
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create deployment package
        run: |
          cat > release-manifest.json <<EOF
          {
            "commit": "${{ github.sha }}",
            "environment": "production",
            "deploymentVersion": "mosaic-${{ github.sha }}"
          }
          EOF
          shopt -s dotglob
          zip -r deploy.zip . \
            -x "*.git*" \
            -x "*node_modules/*" \
            -x "*.env*" \
            -x "*tests/*" \
            -x "*docs/*" \
            -x "*.github/*" \
            -x "*.zip" \
            -x "*logs/*" \
            -x "*.log" \
            -x "debug-data.js" \
            -x "fix-product-data.js" \
            -x "fix-variants.js" \
            -x "test-products.js" \
            -x "*.txt"

      - name: Configure AWS credentials
        id: aws_creds
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          output-credentials: true

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ steps.aws_creds.outputs.aws-access-key-id }}
          aws_secret_key: ${{ steps.aws_creds.outputs.aws-secret-access-key }}
          aws_session_token: ${{ steps.aws_creds.outputs.aws-session-token }}
          application_name: ${{ env.EB_APPLICATION_NAME }}
          environment_name: ${{ env.EB_ENVIRONMENT_NAME }}
          region: ${{ env.AWS_REGION }}
          version_label: mosaic-${{ github.sha }}
          deployment_package: deploy.zip
          use_existing_version_if_available: true
          wait_for_deployment: true
          wait_for_environment_recovery: true

      - name: Post-deploy health probe
        run: |
          echo "Deployed commit: ${{ github.sha }}"
          echo "Version label: mosaic-${{ github.sha }}"
          for i in 1 2 3 4 5; do
            status=$(curl -s -o /tmp/health.json -w "%{http_code}" "${PRODUCTION_API_URL}/")
            echo "Attempt $i: HTTP $status"
            if [ "$status" = "200" ]; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 15
          done
          echo "Health probe failed after 5 attempts"
          exit 1

      - name: Post-deploy auth probe
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" "${PRODUCTION_API_URL}/api/users/auth/check")
          echo "Auth check (unauthenticated): HTTP $status"
          if [ "$status" != "401" ]; then
            echo "Expected 401 for unauthenticated auth/check"
            exit 1
          fi

      - name: Post-deploy readiness probe
        run: |
          for path in /api/health /api/ready /api/build-info; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "${PRODUCTION_API_URL}${path}")
            echo "${path}: HTTP $status"
            if [ "$status" != "200" ]; then
              echo "Expected 200 for ${path}"
              exit 1
            fi
          done
          curl -s "${PRODUCTION_API_URL}/api/health" | node -e "
            const payload = JSON.parse(require('fs').readFileSync(0, 'utf8'));
            if (!payload.release?.commit || !payload.release?.environment || !payload.release?.deploymentVersion) {
              console.error('Missing release identity on /api/health');
              process.exit(1);
            }
            const expected = '${{ github.sha }}'.slice(0, 7);
            if (payload.release.commit !== expected) {
              console.error(\`Release identity mismatch: expected \${expected}, got \${payload.release.commit}\`);
              process.exit(1);
            }
            console.log(\`Release identity matches deployed commit: \${expected}\`);
          "

      - name: Post-deploy CORS probe
        env:
          LAUNCH_ORIGIN: https://mosaic-biz-frontend-launch.vercel.app
          VERCEL_PRODUCTION_ORIGIN: https://mosaic-biz-frontend-launch-digital-builders.vercel.app
          VERCEL_MAIN_ORIGIN: https://mosaic-biz-frontend-launch-git-main-digital-builders.vercel.app
          VERCEL_DEVELOP_ORIGIN: https://mosaic-biz-frontend-launch-git-develop-digital-builders.vercel.app
          APEX_ORIGIN: https://mosaicbizhub.com
          WWW_ORIGIN: https://www.mosaicbizhub.com
          LEGACY_APP_ORIGIN: https://app.mosaicbizhub.com
        run: |
          for origin in "$APEX_ORIGIN" "$WWW_ORIGIN" "$LEGACY_APP_ORIGIN" "$LAUNCH_ORIGIN" "$VERCEL_PRODUCTION_ORIGIN" "$VERCEL_MAIN_ORIGIN" "$VERCEL_DEVELOP_ORIGIN"; do
            echo "CORS OPTIONS for Origin: $origin"
            headers=$(curl -s -D - -o /dev/null -X OPTIONS \
              -H "Origin: $origin" \
              -H "Access-Control-Request-Method: GET" \
              "${PRODUCTION_API_URL}/api/featured-products")
            echo "$headers" | grep -i "access-control-allow-origin: $origin" || {
              echo "Missing Access-Control-Allow-Origin for $origin"
              exit 1
            }
          done
          status=$(curl -s -o /dev/null -w "%{http_code}" "${PRODUCTION_API_URL}/api/featured-products")
          echo "GET /api/featured-products: HTTP $status"
          if [ "$status" != "200" ]; then
            echo "Expected 200 for featured-products GET"
            exit 1
          fi

      - name: Deployment summary
        run: |
          {
            echo "## Production deploy"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Version label | \`mosaic-${{ github.sha }}\` |"
            echo "| EB application | \`${{ env.EB_APPLICATION_NAME }}\` |"
            echo "| EB environment | \`${{ env.EB_ENVIRONMENT_NAME }}\` |"
            echo "| Region | \`${{ env.AWS_REGION }}\` |"
            echo "| API URL | \`${{ env.PRODUCTION_API_URL }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
